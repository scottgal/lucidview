# Dialog smoke test — opens each dialog-bound menu item, screenshots the
# DIALOG ITSELF (not the main window) via per-action `window_id`, dismisses.
#
# Native OS file pickers (Open file..., Export PDF...) still can't be driven
# because they aren't Avalonia Windows; the cross-window tracker can't see
# them. Everything else is a regular Avalonia Window and is fair game.
#
# Run:
#   dotnet run --project MarkdownViewer/MarkdownViewer.csproj -- \
#       --ux-test --script ux-scripts/dialogs.yaml --output ux-results/dialogs

name: dialogs
description: Open and dismiss every dialog-bound menu item
default_delay: 250

actions:
  - type: Wait
    value: "1500"

  - type: Navigate
    value: ux-scripts/test-document.md
  - type: Wait
    value: "800"

  # Settings dialog.
  - type: Click
    target: MenuButton
  - type: Wait
    value: "400"
  - type: Click
    target: MenuSettingsBtn
  - type: Wait
    value: "600"
  - type: Screenshot
    value: dialog-settings
    window_id: SettingsDialog
  - type: PressKey
    value: Escape
    window_id: SettingsDialog
  - type: Wait
    value: "400"

  # Render Mermaid Diagram dialog.
  - type: Click
    target: MenuButton
  - type: Wait
    value: "400"
  - type: Click
    target: MenuRenderMermaidBtn
  - type: Wait
    value: "600"
  - type: Screenshot
    value: dialog-render-mermaid
    window_id: MermaidDialog
  - type: PressKey
    value: Escape
    window_id: MermaidDialog
  - type: Wait
    value: "400"

  # Open URL dialog (InputDialog instance).
  - type: Click
    target: MenuButton
  - type: Wait
    value: "400"
  - type: Click
    target: MenuOpenUrlBtn
  - type: Wait
    value: "600"
  - type: Screenshot
    value: dialog-open-url
    window_id: InputDialog
  - type: PressKey
    value: Escape
    window_id: InputDialog
  - type: Wait
    value: "400"

  # Help — loads README.md, no dialog. Verify the page changes.
  - type: Click
    target: MenuButton
  - type: Wait
    value: "400"
  - type: Click
    target: MenuHelpBtn
  - type: Wait
    value: "1200"
  - type: Screenshot
    value: dialog-help-readme

  # Note: MenuOpenFileBtn and MenuExportPdfBtn open native OS file pickers,
  # which Avalonia cannot drive from inside the harness. Those are smoke-tested
  # manually or in the dedicated print test.
