# Ruler test + capture for the user manual.
#
# The harness now has a real PointerSimulator so we drive the Thumb drag with
# explicit coordinates. lucidVIEW launches at 1100×750, the left gutter is
# 18px, the default ContentMaxWidth is 900, so the right handle sits around
# (1009, 11) and the left handle around (109, 11) when the ruler is on.
# These coordinates must match the math in MainWindow.UpdateRulerHandlesFromWidth.
#
# Run:
#   dotnet run --project MarkdownViewer/MarkdownViewer.csproj -- \
#       --ux-test --script ux-scripts/capture-ruler.yaml \
#       --output MarkdownViewer/Assets/manual/screenshots

name: capture-ruler
description: Capture the Word-style ruler in its on/off states for the manual
default_delay: 350

actions:
  - type: Wait
    value: "1500"

  - type: Navigate
    value: ux-scripts/test-document.md
  - type: Wait
    value: "900"

  # Default — no ruler.
  - type: Screenshot
    value: 17-ruler-off
    description: Document with the ruler hidden (default)

  # Toggle the ruler on. The header has RulerToggleBtn next to ResetZoomBtn.
  - type: Click
    target: RulerToggleBtn
  - type: Wait
    value: "600"
  - type: Screenshot
    value: 18-ruler-on
    description: Document with the ruler visible — handles + dotted guides + width readout

  # Toggle off so subsequent runs start clean.
  - type: Click
    target: RulerToggleBtn
  - type: Wait
    value: "300"
