# Wikipedia Avalonia (framework) page — static HTML, well-structured, lots of
# images + infobox. Baseline for "does the extraction pipeline work on a
# server-rendered site?".

name: verify-full-wikipedia
description: Wikipedia smoke — Markdown_language article (no parens to URL-encode)
default_delay: 400

actions:
  - type: Wait
    value: "3500"
  - type: Screenshot
    value: 01-boot

  - type: Click
    target: MenuButton
  - type: Wait
    value: "500"
  - type: Click
    target: MenuOpenUrlBtn
  - type: Wait
    value: "700"

  - type: TypeText
    target: InputBox
    value: "https://en.wikipedia.org/wiki/Markdown"
    window_id: InputDialog
  - type: Wait
    value: "300"
  - type: Click
    target: OkButton
    window_id: InputDialog

  - type: Wait
    value: "25000"
  - type: Screenshot
    value: 02-wikipedia-loaded
